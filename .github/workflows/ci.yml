name: Java CI

on:
  push: 
    branches: [ main ]
  pull_request: 
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
   - name: Checkout repository
     uses: actions/checkout@v3

   - name: Set up JDK 25
     uses: actions/setup-java@v3
     with:
       java-version:  '25'
       distrubution:  'temurin'

     - name: Build with Maven
       working-directory: Calculator
       run: mvn clean install

     - name: Run tests
       working-directory: Calculator
       run: mvn test
